<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }
    .completed {
      text-decoration: line-through;
      color: gray;
    }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="card shadow-lg">
    <div class="card-body">
      <h2 class="text-center mb-4">📝 Todo List</h2>

      <div class="input-group mb-3">
        <input type="text" id="taskInput" class="form-control" placeholder="Enter task">
        <button class="btn btn-primary" onclick="addTask()">Add</button>
      </div>

      <ul id="taskList" class="list-group"></ul>
    </div>
  </div>
</div>

<script>
function addTask() {
  let input = document.getElementById("taskInput");
  let taskText = input.value.trim();

  if (taskText === "") return;

  let li = document.createElement("li");
  li.className = "list-group-item d-flex justify-content-between align-items-center";

  li.innerHTML = `
    <div class="form-check">
      <input class="form-check-input me-2" type="checkbox" onclick="toggleDone(this)">
      <span>${taskText}</span>
    </div>
    <div>
      <button class="btn btn-sm btn-warning me-2" onclick="editTask(this)">Edit</button>
      <button class="btn btn-sm btn-danger" onclick="deleteTask(this)">Delete</button>
    </div>
  `;

  document.getElementById("taskList").appendChild(li);
  input.value = "";
}

function deleteTask(btn) {
  btn.closest("li").remove();
}

function toggleDone(checkbox) {
  let text = checkbox.nextElementSibling;
  text.classList.toggle("completed");
}

function editTask(btn) {
  let li = btn.closest("li");
  let span = li.querySelector("span");
  let newTask = prompt("Edit your task:", span.textContent);

  if (newTask !== null && newTask.trim() !== "") {
    span.textContent = newTask.trim();
  }
}
</script>

</body>
</html>
